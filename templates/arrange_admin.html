<!DOCTYPE html>
<html>
<head>
    <title>Admin - Sorter Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='arrange.css') }}">
    <style>
        .admin-form-box {
            background: #f0f0f0; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 30px;
            border: 2px solid #ddd;
        }
        .admin-form-box input {
            display: block;
            width: 90%;
            margin: 10px auto;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #fff;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        .action-btn {
            padding: 5px 12px;
            font-size: 0.9rem;
            margin: 2px;
        }
    </style>
</head>
<body>
    <div class="card" style="max-width: 850px;">
        <h1 style="color: #073b4c;">Admin Dashboard</h1>
        
        <div class="admin-form-box">
            <h3 id="form-title">Add New Sequence</h3>
            <input type="number" id="id" placeholder="Level ID (e.g. 1)">
            <input type="text" id="pattern" placeholder="Goal Sequence (e.g. 2, 4, 6, 8)">
            
            <input type="text" id="scrambled" placeholder="Initial Scramble (e.g. 6, 2, 8, 4)">
            
            <div class="btn-row">
                <button id="save-btn" onclick="save()" style="background: #06d6a0;">Save Sequence</button>
                <button type="button" onclick="autoScramble()" style="background: #118ab2;">Magic Scramble</button>
                <button id="cancel-btn" onclick="resetForm()" style="display:none; background: #999;">Cancel</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Goal (Pattern)</th>
                    <th>Starting Order</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
        
        <br>
        <a href="/" style="text-decoration: none; color: #118ab2; font-weight: bold;">← Back to Game</a>
    </div>

    <script>
        let isEdit = false;

        // Automatically shuffle the goal pattern if the admin wants help
        function autoScramble() {
            const patternInput = document.getElementById('pattern').value;
            if (!patternInput) {
                alert("Please enter a Goal Sequence first!");
                return;
            }
            const arr = patternInput.split(',').map(n => n.trim());
            const shuffled = [...arr].sort(() => Math.random() - 0.5);
            document.getElementById('scrambled').value = shuffled.join(', ');
        }

        async function load() {
            const res = await fetch('/api/sequences');
            const data = await res.json();
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = data.map(s => `
                <tr>
                    <td>${s.id}</td>
                    <td><b>${s.pattern.join(', ')}</b></td>
                    <td>${s.scrambled.join(', ')}</td>
                    <td>
                        <button class="action-btn" onclick='editEntry(${JSON.stringify(s)})' style="background: #ffd166; color: #333;">Edit</button>
                        <button class="action-btn" onclick="deleteEntry(${s.id})" style="background: #ef476f;">Del</button>
                    </td>
                </tr>
            `).join('');
        }

        function editEntry(s) {
            isEdit = true;
            document.getElementById('form-title').innerText = "Update Sequence #" + s.id;
            document.getElementById('id').value = s.id;
            document.getElementById('id').disabled = true; // Lock ID during edit
            document.getElementById('pattern').value = s.pattern.join(', ');
            document.getElementById('scrambled').value = s.scrambled.join(', ');
            
            document.getElementById('save-btn').innerText = "Update";
            document.getElementById('cancel-btn').style.display = "inline-block";
        }

        function resetForm() {
            isEdit = false;
            document.getElementById('form-title').innerText = "Add New Sequence";
            document.getElementById('id').value = "";
            document.getElementById('id').disabled = false;
            document.getElementById('pattern').value = "";
            document.getElementById('scrambled').value = "";
            document.getElementById('save-btn').innerText = "Save Sequence";
            document.getElementById('cancel-btn').style.display = "none";
        }

        async function save() {
            const id = document.getElementById('id').value;
            const pattern = document.getElementById('pattern').value.split(',').map(n => parseInt(n.trim()));
            let scrambledVal = document.getElementById('scrambled').value;
            
            // Logic to handle manual vs auto scrambling
            let scrambled;
            if (scrambledVal.trim() !== "") {
                scrambled = scrambledVal.split(',').map(n => parseInt(n.trim()));
            } else {
                scrambled = [...pattern].sort(() => Math.random() - 0.5);
            }

            const payload = {
                id: parseInt(id),
                pattern: pattern,
                scrambled: scrambled
            };

            const method = isEdit ? 'PUT' : 'POST';
            const url = isEdit ? `/api/sequences/${id}` : '/api/sequences';

            await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            resetForm();
            load();
        }

        async function deleteEntry(id) {
            if (confirm("Are you sure you want to delete this level?")) {
                await fetch(`/api/sequences/${id}`, { method: 'DELETE' });
                load();
            }
        }

        // Initial load
        load();
    </script>
</body>
</html>
